<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.5" />
  <title>GIS Utran · Student Council 2026-27</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container" role="main">
    <!-- header with circular logo & school name -->
    <header>
      <div class="logo" aria-hidden="true">
        <img src="Logo.png" alt="Gajera International School logo" loading="lazy" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22 viewBox=%220 0 80 80%22%3E%3Ccircle cx=%2240%22 cy=%2240%22 r=%2238%22 fill=%22%231e3a8a%22 stroke=%22%233b82f6%22 stroke-width=%222%22/%3E%3Ctext x=%2240%22 y=%2252%22 font-family=%22Inter, sans-serif%22 font-size=%2232%22 font-weight=%22800%22 text-anchor=%22middle%22 fill=%22white%22%3EG%3C/text%3E%3C/svg%3E';" />
      </div>
      <div class="school-info">
        <div class="school-name">Shri H. J. Gajera Madhyamik ane Uchchtar Madhyamik Shala, Utran</div>
        <div class="school-location">✦ Student Council Election 2026-27 ✦</div>
      </div>
    </header>

    <h1 class="main-title">
      <span class="material-icons">how_to_vote</span> Head Boy / Head Girl Vote
    </h1>

    <!-- HOME VIEW -->
    <section id="home-view" class="view active" aria-label="Voting categories">
      <div class="button-grid" role="list">
        <button type="button" class="btn head-class" data-category="head-class">
          <span class="material-icons" aria-hidden="true">school</span> Head Boy / Head Girl
        </button>
      </div>
      <div class="controls-container">
        <button id="show-results-btn" class="btn view-results" aria-label="View results">
          <span class="material-icons" aria-hidden="true">poll</span> View Results
        </button>
        <button id="reset-btn" class="btn reset-votes" aria-label="Reset all votes">
          <span class="material-icons" aria-hidden="true">restart_alt</span> Reset Votes
        </button>
      </div>
    </section>

    <!-- GENDER SELECTION VIEW -->
    <section id="gender-selection-view" class="view" aria-label="Select gender">
      <h2><span class="material-icons" style="font-size:2rem;">people</span> Head Boy / Head Girl</h2>
      <div class="button-grid" id="gender-buttons">
        <button class="btn gender-male" data-gender="male"><span class="material-icons">male</span> Male</button>
        <button class="btn gender-female" data-gender="female"><span class="material-icons">female</span> Female</button>
      </div>
      <button class="btn back-btn" data-action="go-home">
        <span class="material-icons">arrow_back</span> Back to Home
      </button>
    </section>

    <!-- CANDIDATE VIEW -->
    <section id="candidate-view" class="view" aria-live="polite" aria-atomic="true">
      <h2 id="candidate-category-title"></h2>
      <div class="candidates-list" id="candidates-list"></div>
      <div class="info-message" id="info-message-candidate"></div>
      <button class="btn back-btn" data-action="go-to-gender-select">
        <span class="material-icons">arrow_back</span> Back to Gender
      </button>
    </section>

    <!-- RESULTS VIEW -->
    <section id="results-view" class="view" aria-live="polite" tabindex="-1">
      <h2>📊 Voting Results</h2>
      <div class="results-container" id="results-container">
        <div class="winner-section" id="winner-section">
          <h3>🏆 Winner(s)</h3>
          <div id="winner-display" class="winner-display"></div>
        </div>
        <div class="results-list" id="results-list"></div>
      </div>
      <button id="results-back-btn" class="btn back-btn">
        <span class="material-icons">arrow_back</span> Back to Home
      </button>
    </section>
  </div>

  <!-- password modal -->
  <div class="modal-overlay" id="password-modal">
    <div class="modal-content">
      <h3 class="modal-title" id="modal-title">🔐 Enter Password</h3>
      <input type="password" class="password-input" id="password-input" placeholder="Admin password" />
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="cancel-password">Cancel</button>
        <button class="modal-btn submit" id="submit-password">Submit</button>
      </div>
    </div>
  </div>

  <!-- toast container -->
  <div class="custom-toast" id="toast-message"></div>

  <script src="script.js"></script>
</body>
</html>
